openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scan
    description: Item scanning and language learning
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: vocab
    description: Curated vocabulary word bank and study
  - name: account
    description: Account linking and device carry-over
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scan:
    post:
      operationId: scanItem
      tags: [scan]
      summary: Scan an item and start a language conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "201":
          description: Item scanned and conversation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /vocabulary:
    get:
      operationId: listVocabulary
      tags: [scan]
      summary: Aggregate unique words from all conversation messages
      responses:
        "200":
          description: List of unique words across all conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VocabularyEntry"
  /vocab/bank:
    get:
      operationId: getVocabBank
      tags: [vocab]
      summary: Get the curated word bank for a language, grouped by difficulty
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
        - name: nativeLanguage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Word bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabBank"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/selections:
    get:
      operationId: listVocabSelections
      tags: [vocab]
      summary: List the words the customer has picked to learn
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Picked words
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VocabSelection"
    post:
      operationId: addVocabSelection
      tags: [vocab]
      summary: Pick a word to learn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabSelectionInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabSelection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/selections/{id}:
    delete:
      operationId: deleteVocabSelection
      tags: [vocab]
      summary: Remove a picked word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/selections/bulk:
    post:
      operationId: bulkUpdateVocabSelections
      tags: [vocab]
      summary: Bulk move (master/unmaster) or delete picked words
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabBulkInput"
      responses:
        "200":
          description: Number of rows affected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabBulkResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/example:
    post:
      operationId: getVocabExample
      tags: [vocab]
      summary: Generate an example sentence using a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabExampleInput"
      responses:
        "200":
          description: Example sentence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabExample"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/check:
    post:
      operationId: checkVocabSentence
      tags: [vocab]
      summary: Check a learner's own sentence using a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabCheckInput"
      responses:
        "200":
          description: Feedback on the sentence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabCheck"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/search:
    post:
      operationId: searchVocab
      tags: [vocab]
      summary: Search for words by a term and translate them for study
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabSearchInput"
      responses:
        "200":
          description: Matching words
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabSearchResults"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /sentences/bank:
    get:
      operationId: getSentenceBank
      tags: [vocab]
      summary: Get everyday survival phrases for a language, grouped by situation
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
        - name: nativeLanguage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sentence bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceBank"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /openai/conversations/chat:
    post:
      operationId: startOpenaiChat
      tags: [openai]
      summary: Start a free speak-or-type tutor conversation (no scan required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartChatInput"
      responses:
        "201":
          description: Conversation created with an opening tutor message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartChatResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/conversations/{id}/grade:
    post:
      operationId: gradeOpenaiConversation
      tags: [openai]
      summary: Grade the learner's performance in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiGradeInput"
      responses:
        "200":
          description: Grade result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationGrade"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "422":
          description: Not enough learner messages to grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "502":
          description: Grading failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /account/link:
    post:
      operationId: linkAccount
      tags: [account]
      summary: Link anonymous device data into the signed-in account
      description: >
        Called after sign-in. Merges the anonymous device customer's
        conversations, vocabulary selections, and usage counters into the
        authenticated account, then deletes the device row. Idempotent — calling
        it again (or with an unknown device id) is a no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountLinkInput"
      responses:
        "200":
          description: Link result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLinkResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /me/plan:
    get:
      operationId: getMyPlan
      tags: [account]
      summary: Get the server's view of the caller's subscription plan
      description: >
        Returns the plan ('free' | 'pro') and proSince timestamp the server has
        recorded for the resolved customer (signed-in account row or anonymous
        device row). The server keeps this in sync from RevenueCat webhooks, so
        it is the authoritative, tamper-resistant view of entitlement for
        server-side surfaces. Resolves to 'free' when no customer is attached.
        Pass `refresh=true` right after a purchase/restore to bypass the
        server's short cache and force a live RevenueCat reconcile.
      parameters:
        - name: refresh
          in: query
          required: false
          description: >
            When true, bypasses the server's plan cache and forces a live
            RevenueCat pull so a just-completed purchase/restore reflects
            immediately.
          schema:
            type: boolean
      responses:
        "200":
          description: Plan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanStatus"
  /account:
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the caller's account and all associated data
      description: >
        Deletes the customer row resolved for the caller (either the signed-in
        account row or the anonymous device row), cascade-deleting all of their
        conversations, messages, and vocabulary selections. Idempotent — when no
        customer row is resolved it is a clean no-op. Clerk user deletion and
        local-storage wiping are handled client-side.
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeleteResult"
        "500":
          description: Deletion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AccountLinkInput:
      type: object
      properties:
        deviceId:
          type: string
          description: The anonymous device id whose data should be carried over.
      required:
        - deviceId
    AccountLinkResult:
      type: object
      properties:
        linked:
          type: boolean
          description: True if a device row was found and merged; false on no-op.
        conversationsMoved:
          type: integer
        vocabSelectionsMoved:
          type: integer
        email:
          type: string
          nullable: true
          description: The Clerk-verified primary email stored on the account.
      required:
        - linked
        - conversationsMoved
        - vocabSelectionsMoved
    AccountDeleteResult:
      type: object
      properties:
        deleted:
          type: boolean
          description: True if a customer row was found and deleted; false on no-op.
      required:
        - deleted
    PlanStatus:
      type: object
      properties:
        plan:
          type: string
          description: Subscription tier — 'free' or 'pro'.
        proSince:
          type: string
          format: date-time
          nullable: true
          description: When the customer became pro; null while on the free plan.
        scanLimit:
          type: integer
          description: Daily free-tier scan allowance.
        scansUsedToday:
          type: integer
          description: Scans used so far during the current UTC day.
        scansRemaining:
          type: integer
          nullable: true
          description: Scans remaining today; null means unlimited (Pro).
        scanResetsAt:
          type: string
          format: date-time
          description: When the daily scan allowance refills (next UTC midnight).
      required:
        - plan
    ScanRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        targetLanguage:
          type: string
          description: Language to learn (e.g. "Spanish", "French", "Japanese")
        nativeLanguage:
          type: string
          description: User's native language (e.g. "English")
        difficulty:
          type: string
          description: Conversation difficulty tier ("Beginner", "Intermediate", "Advanced")
      required:
        - imageBase64
        - targetLanguage
        - nativeLanguage
    ScanResult:
      type: object
      properties:
        conversationId:
          type: integer
        itemName:
          type: string
          description: Identified item name in English
        itemNameTranslated:
          type: string
          description: Identified item name in target language
        initialMessage:
          type: string
          description: First AI message to start the conversation
        scanLimit:
          type: integer
          description: Daily free-tier scan allowance.
        scansUsedToday:
          type: integer
          description: Scans used so far during the current UTC day (including this one).
        scansRemaining:
          type: integer
          nullable: true
          description: Scans remaining today after this one; null means unlimited (Pro).
        scanResetsAt:
          type: string
          format: date-time
          description: When the daily scan allowance refills (next UTC midnight).
      required:
        - conversationId
        - itemName
        - itemNameTranslated
        - initialMessage
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        lastOpenedAt:
          type: string
          format: date-time
          nullable: true
        gradeScore:
          type: integer
          nullable: true
          description: Most recent end-of-conversation grade (0-100), if graded
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
        targetLanguage:
          type: string
          description: Current learning language (re-anchored each turn)
        difficulty:
          type: string
          description: Conversation difficulty tier ("Beginner", "Intermediate", "Advanced")
      required:
        - content
    OpenaiGradeMistake:
      type: object
      properties:
        error:
          type: string
        correction:
          type: string
      required:
        - error
        - correction
    OpenaiConversationGrade:
      type: object
      properties:
        score:
          type: integer
          description: Overall score from 0 to 100
        summary:
          type: string
        strengths:
          type: array
          items:
            type: string
        mistakes:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiGradeMistake"
        suggestions:
          type: array
          items:
            type: string
        gradedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - score
        - summary
        - strengths
        - mistakes
        - suggestions
    OpenaiGradeInput:
      type: object
      properties:
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
        difficulty:
          type: string
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        lastOpenedAt:
          type: string
          format: date-time
          nullable: true
        difficulty:
          type: string
          nullable: true
        grade:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OpenaiConversationGrade"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    VocabularyEntry:
      type: object
      properties:
        word:
          type: string
        language:
          type: string
        count:
          type: integer
        firstSeenAt:
          type: string
          format: date-time
        conversationId:
          type: integer
        conversationTitle:
          type: string
      required:
        - word
        - language
        - count
        - firstSeenAt
        - conversationId
        - conversationTitle
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    VocabBankWord:
      type: object
      properties:
        word:
          type: string
        translation:
          type: string
        level:
          type: string
          description: beginner | intermediate | advanced | expert
      required:
        - word
        - translation
        - level
    VocabBank:
      type: object
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/VocabBankWord"
      required:
        - words
    VocabSearchInput:
      type: object
      properties:
        query:
          type: string
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - query
        - targetLanguage
        - nativeLanguage
    VocabSearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/VocabBankWord"
      required:
        - results
    VocabSelection:
      type: object
      properties:
        id:
          type: integer
        targetLanguage:
          type: string
        level:
          type: string
        word:
          type: string
        translation:
          type: string
        mastered:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - targetLanguage
        - level
        - word
        - translation
        - mastered
        - createdAt
    VocabSelectionInput:
      type: object
      properties:
        targetLanguage:
          type: string
        level:
          type: string
        word:
          type: string
        translation:
          type: string
      required:
        - targetLanguage
        - level
        - word
        - translation
    VocabBulkInput:
      type: object
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: integer
        action:
          type: string
          enum: [master, unmaster, delete]
      required:
        - ids
        - action
    VocabBulkResult:
      type: object
      properties:
        affected:
          type: integer
      required:
        - affected
    VocabExampleInput:
      type: object
      properties:
        word:
          type: string
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - word
        - targetLanguage
        - nativeLanguage
    VocabExample:
      type: object
      properties:
        sentence:
          type: string
          description: Example sentence in the target language
        translation:
          type: string
          description: Translation of the sentence in the native language
      required:
        - sentence
        - translation
    VocabCheckInput:
      type: object
      properties:
        word:
          type: string
        sentence:
          type: string
          description: The learner's own sentence
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - word
        - sentence
        - targetLanguage
        - nativeLanguage
    VocabCheck:
      type: object
      properties:
        correct:
          type: boolean
        feedback:
          type: string
          description: Encouraging feedback in the native language
        correction:
          type: string
          description: A corrected version of the sentence, if needed
      required:
        - correct
        - feedback
        - correction
    SentencePhrase:
      type: object
      properties:
        category:
          type: string
          description: Situation grouping, e.g. greetings | basics | directions
        phrase:
          type: string
          description: The phrase written in the target language
        translation:
          type: string
          description: Translation of the phrase in the native language
      required:
        - category
        - phrase
        - translation
    SentenceBank:
      type: object
      properties:
        sentences:
          type: array
          items:
            $ref: "#/components/schemas/SentencePhrase"
      required:
        - sentences
    StartChatInput:
      type: object
      properties:
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - targetLanguage
        - nativeLanguage
    StartChatResult:
      type: object
      properties:
        conversationId:
          type: integer
        initialMessage:
          type: string
          description: The tutor's opening message in the target language
      required:
        - conversationId
        - initialMessage
