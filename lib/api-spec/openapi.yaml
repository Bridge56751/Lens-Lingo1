openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scan
    description: Item scanning and language learning
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: vocab
    description: Curated vocabulary word bank and study
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scan:
    post:
      operationId: scanItem
      tags: [scan]
      summary: Scan an item and start a language conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "201":
          description: Item scanned and conversation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /vocabulary:
    get:
      operationId: listVocabulary
      tags: [scan]
      summary: Aggregate unique words from all conversation messages
      responses:
        "200":
          description: List of unique words across all conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VocabularyEntry"
  /vocab/bank:
    get:
      operationId: getVocabBank
      tags: [vocab]
      summary: Get the curated word bank for a language, grouped by difficulty
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
        - name: nativeLanguage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Word bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabBank"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/selections:
    get:
      operationId: listVocabSelections
      tags: [vocab]
      summary: List the words the customer has picked to learn
      parameters:
        - name: targetLanguage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Picked words
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VocabSelection"
    post:
      operationId: addVocabSelection
      tags: [vocab]
      summary: Pick a word to learn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabSelectionInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabSelection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/selections/{id}:
    delete:
      operationId: deleteVocabSelection
      tags: [vocab]
      summary: Remove a picked word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/example:
    post:
      operationId: getVocabExample
      tags: [vocab]
      summary: Generate an example sentence using a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabExampleInput"
      responses:
        "200":
          description: Example sentence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabExample"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /vocab/check:
    post:
      operationId: checkVocabSentence
      tags: [vocab]
      summary: Check a learner's own sentence using a word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabCheckInput"
      responses:
        "200":
          description: Feedback on the sentence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabCheck"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ScanRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        targetLanguage:
          type: string
          description: Language to learn (e.g. "Spanish", "French", "Japanese")
        nativeLanguage:
          type: string
          description: User's native language (e.g. "English")
      required:
        - imageBase64
        - targetLanguage
        - nativeLanguage
    ScanResult:
      type: object
      properties:
        conversationId:
          type: integer
        itemName:
          type: string
          description: Identified item name in English
        itemNameTranslated:
          type: string
          description: Identified item name in target language
        initialMessage:
          type: string
          description: First AI message to start the conversation
      required:
        - conversationId
        - itemName
        - itemNameTranslated
        - initialMessage
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    VocabularyEntry:
      type: object
      properties:
        word:
          type: string
        language:
          type: string
        count:
          type: integer
        firstSeenAt:
          type: string
          format: date-time
        conversationId:
          type: integer
        conversationTitle:
          type: string
      required:
        - word
        - language
        - count
        - firstSeenAt
        - conversationId
        - conversationTitle
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    VocabBankWord:
      type: object
      properties:
        word:
          type: string
        translation:
          type: string
        level:
          type: string
          description: beginner | intermediate | advanced
      required:
        - word
        - translation
        - level
    VocabBank:
      type: object
      properties:
        words:
          type: array
          items:
            $ref: "#/components/schemas/VocabBankWord"
      required:
        - words
    VocabSelection:
      type: object
      properties:
        id:
          type: integer
        targetLanguage:
          type: string
        level:
          type: string
        word:
          type: string
        translation:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - targetLanguage
        - level
        - word
        - translation
        - createdAt
    VocabSelectionInput:
      type: object
      properties:
        targetLanguage:
          type: string
        level:
          type: string
        word:
          type: string
        translation:
          type: string
      required:
        - targetLanguage
        - level
        - word
        - translation
    VocabExampleInput:
      type: object
      properties:
        word:
          type: string
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - word
        - targetLanguage
        - nativeLanguage
    VocabExample:
      type: object
      properties:
        sentence:
          type: string
          description: Example sentence in the target language
        translation:
          type: string
          description: Translation of the sentence in the native language
      required:
        - sentence
        - translation
    VocabCheckInput:
      type: object
      properties:
        word:
          type: string
        sentence:
          type: string
          description: The learner's own sentence
        targetLanguage:
          type: string
        nativeLanguage:
          type: string
      required:
        - word
        - sentence
        - targetLanguage
        - nativeLanguage
    VocabCheck:
      type: object
      properties:
        correct:
          type: boolean
        feedback:
          type: string
          description: Encouraging feedback in the native language
        correction:
          type: string
          description: A corrected version of the sentence, if needed
      required:
        - correct
        - feedback
        - correction
